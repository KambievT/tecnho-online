services:
  minio:
    image: minio/minio
    container_name: technodom-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - technet

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: technodom-backend
    restart: unless-stopped
    depends_on:
      - minio
    environment:
      PORT: 4000
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/appdb}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: products
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-}
      PUBLIC_API_URL: ${PUBLIC_API_URL:-}
    networks:
      - technet

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: technodom-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      INTERNAL_API_URL: http://backend:4000/api
      HOSTNAME: "0.0.0.0"
    ports:
      - "80:3000"
    networks:
      - technet

volumes:
  minio-data:

networks:
  technet:
    driver: bridge
